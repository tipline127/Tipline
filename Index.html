// Sport emoji map
const SPORT_EMOJI = { 'Fútbol':'⚽', 'Baloncesto':'🏀', 'Tenis':'🎾', 'Hockey':'🏒', 'NFL':'🏈', 'Béisbol':'⚾', 'MMA':'🥊' };

// ── PARSE CSV ──
function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = lines[0].split(',').map(h => h.trim().toLowerCase().replace(/\s+/g,'_'));
  return lines.slice(1).map(line => {
    const vals = line.split(',');
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (vals[i]||'').trim(); });
    return obj;
  });
}

// ── STATS CALCULATION ──
function calcStats(picks) {
  const resolved = picks.filter(p => ['WIN','LOSS','VOID'].includes(p.resultado?.toUpperCase()));
  const wins = picks.filter(p => p.resultado?.toUpperCase() === 'WIN').length;
  const losses = picks.filter(p => p.resultado?.toUpperCase() === 'LOSS').length;
  const voids = picks.filter(p => p.resultado?.toUpperCase() === 'VOID').length;
  const pct = resolved.length > 0 ? Math.round((wins / (wins + losses)) * 100) : 0;

  // Simple ROI: sum of (cuota-1) for wins, -1 for losses, per unit
  let profit = 0;
  resolved.forEach(p => {
    const u = parseFloat(p.unidades) || 1;
    const c = parseFloat(p.cuota) || 1;
    if (p.resultado?.toUpperCase() === 'WIN') profit += (c - 1) * u;
    else if (p.resultado?.toUpperCase() === 'LOSS') profit -= u;
  });
  const totalStaked = resolved.reduce((s,p) => s + (parseFloat(p.unidades)||1), 0);
  const roi = totalStaked > 0 ? ((profit / totalStaked) * 100).toFixed(1) : '0.0';

  // Streak
  let streak = 0, streakType = '';
  const byDate = [...resolved].reverse();
  for (const p of byDate) {
    const r = p.resultado?.toUpperCase();
    if (r === 'VOID') continue;
    if (!streakType) { streakType = r; streak = 1; }
    else if (r === streakType) streak++;
    else break;
  }

  // By sport
  const sports = {};
  picks.forEach(p => {
    const s = p.deporte || 'Otro';
    if (!sports[s]) sports[s] = { w:0, l:0 };
    if (p.resultado?.toUpperCase() === 'WIN') sports[s].w++;
    else if (p.resultado?.toUpperCase() === 'LOSS') sports[s].l++;
  });

  const todayPicks = picks.filter(p => isToday(p.fecha)).length;

  return { wins, losses, voids, pct, roi, streak, streakType, sports, todayPicks, total: picks.length };
}

// ── RENDER PICK CARD ──
function renderCard(pick) {
  const res = (pick.resultado || 'PENDING').toUpperCase();
  const isPremium = pick.premium?.toLowerCase() === 'si';
  const emoji = SPORT_EMOJI[pick.deporte] || '🏅';
  const units = parseInt(pick.unidades) || 1;
  const confLevel = units >= 4 ? 'Muy alta' : units === 3 ? 'Alta' : 'Media';

  // Confidence dots
  const dots = Array.from({length:5}, (_,i) =>
    `<div class="conf-dot${i < units ? ' on' : ''}"></div>`
  ).join('');

  // Right side
  let rightHTML = '';
  if (isPremium && res === 'PENDING') {
    rightHTML = `<div class="locked-box">🔒 Acceso Premium</div>`;
  } else {
    rightHTML = `
      <div class="pick-selection">${isPremium && res==='PENDING' ? '••••••••' : pick.seleccion}</div>
      <div class="pick-odds">${pick.cuota}</div>
      <div class="result-pill ${res}">${res}</div>
      <div class="confidence">
        <div style="display:flex;gap:2px">${dots}</div>
        <span class="conf-label">${confLevel}</span>
      </div>`;
  }  const isLive = res === 'PENDING' && isToday(pick.fecha);
  const timeHTML = isLive
    ? `<span class="live-badge"><span class="live-dot"></span>Hoy ${pick.hora}</span>`
    : `<span class="time-badge">${pick.fecha} ${pick.hora}</span>`;

  return `
    <div class="pick-card${isPremium?' premium':''}" data-result="${res}" data-sport="${pick.deporte}">
      <div class="pick-header">
        <div class="sport-tag">${emoji} ${pick.deporte} · ${pick.liga}</div>
        <div class="pick-meta">
          ${isPremium ? '<span class="premium-badge">★ Premium</span>' : ''}
          ${timeHTML}
        </div>
      </div>
      <div class="pick-body">
        <div class="match-info">
          <div class="match-teams">${pick.partido}</div>
          <div class="match-league">${pick.notas ? pick.notas.substring(0,60)+(pick.notas.length>60?'...':'') : ''}</div>
          <div class="stake">
            ${Array.from({length:5},(_,i)=>`<div class="stake-dot${i<units?' on':''}"></div>`).join('')}
          </div>
        </div>
        <div class="pick-right">${rightHTML}</div>
      </div>
    </div>`;
}

// ── RENDER ALL ──
let allPicks = [];
let activeTab = 'today';
let activeSport = 'all';

function renderPicks() {
  let filtered = allPicks;

  if (activeTab === 'today') filtered = filtered.filter(p => isToday(p.fecha));
  else if (activeTab === 'upcoming') filtered = filtered.filter(p => isFuture(p.fecha) && !isToday(p.fecha));

  if (activeSport !== 'all') filtered = filtered.filter(p => p.deporte === activeSport);

  const container = document.getElementById('picks-container');
  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="icon">📭</div>No hay picks para esta selección</div>`;
    return;
  }

  // Sort: PENDING first, then by date desc
  filtered.sort((a,b) => {
    if (a.resultado==='PENDING' && b.resultado!=='PENDING') return -1;
    if (a.resultado!=='PENDING' && b.resultado==='PENDING') return 1;
    return 0;
  });

  container.innerHTML = filtered.map(renderCard).join('');
}

// ── RENDER SIDEBAR ──
function renderSidebar(stats) {
  document.getElementById('stat-pct').textContent = stats.pct + '%';
  document.getElementById('stat-roi').textContent = (stats.roi >= 0 ? '+' : '') + stats.roi + '%';
  document.getElementById('stat-total').textContent = stats.total;
  document.getElementById('stat-today').textContent = stats.todayPicks;
  document.getElementById('stat-streak').textContent = stats.streak + (stats.streakType === 'WIN' ? '🟢' : stats.streakType === 'LOSS' ? '🔴' : '');
  document.getElementById('side-roi').textContent = (stats.roi >= 0 ? '+' : '') + stats.roi + '%';
  document.getElementById('side-wins').textContent = stats.wins;
  document.getElementById('side-losses').textContent = stats.losses;
  document.getElementById('side-voids').textContent = stats.voids;

  // Perf by sport
  const perfList = document.getElementById('perf-list');
  const sportEntries = Object.entries(stats.sports)
    .filter(([,v]) => (v.w+v.l) > 0)
    .map(([s,v]) => ({ s, pct: Math.round(v.w/(v.w+v.l)*100) }))
    .sort((a,b) => b.pct - a.pct)
    .slice(0, 5);

  perfList.innerHTML = sportEntries.map(({s, pct}) => `
    <div class="perf-row">
      <span class="perf-label">${s}</span>
      <div class="perf-track"><div class="perf-fill" data-w="${pct}"></div></div>
      <span class="perf-pct">${pct}%</span>
    </div>`).join('');

  setTimeout(() => {
    document.querySelectorAll('.perf-fill').forEach(el => {
      el.style.width = el.dataset.w + '%';
    });
  }, 200);

  // Recent results
  const recent = allPicks
    .filter(p => ['WIN','LOSS','VOID'].includes(p.resultado?.toUpperCase()))
    .slice(-6).reverse();

  document.getElementById('recent-results').innerHTML = recent.map(p => {
    const r = p.resultado.toUpperCase();
    return `
      <div class="result-row">
        <div class="res-badge ${r}">${r}</div>
        <div class="res-info">
          <div class="res-match">${p.partido}</div>
          <div class="res-pick">${p.seleccion}</div>
        </div>
        <div class="res-odds ${r==='WIN'?'win':''}">${p.cuota}</div>
      </div>`;
  }).join('');
}

// ── TICKER ──
function renderTicker(picks) {
  const resolved = picks.filter(p => p.resultado?.toUpperCase() !== 'PENDING').slice(-12);
  const items = resolved.map(p => {
    const r = p.resultado.toUpperCase();
    const tag = r === 'WIN' ? `<span class="win-tag">WIN</span>` : r === 'LOSS' ? `<span class="loss-tag">LOSS</span>` : `<span class="win-tag">VOID</span>`;
    return `<span class="ticker-item">${p.partido} · ${p.seleccion}<span class="odds-tag">@${p.cuota}</span>${tag}</span>`;
  }).join('');
  const doubled = items + items; // loop
  const el = document.getElementById('ticker-inner');
  el.innerHTML = doubled;
}
